<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- Background: template bg2 = #00284C -->
  <rect width="1280" height="720" fill="#00284C"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#04D0E6"/>

  <!-- Subtle center glow -->
  <ellipse cx="640" cy="360" rx="500" ry="300" fill="#005198" fill-opacity="0.08"/>

  <!-- Vertical separator line (template closing layout element) -->
  <rect x="830" y="120" width="1" height="480" fill="#B9B9BD" fill-opacity="0.3"/>

  <!-- ===== Left / Center area: Thank You ===== -->

  <!-- Large "Thank You" title -->
  <text x="415" y="290" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF" text-anchor="middle">感谢评审委员会</text>

  <!-- Horizontal rule below title -->
  <rect x="185" y="315" width="460" height="1" fill="#B9B9BD" fill-opacity="0.4"/>

  <!-- Subtitle / promise -->
  <text x="415" y="355" font-family="Arial, sans-serif" font-size="18" fill="#B9B9BD" text-anchor="middle">期待与各位共同推进NPI数字化产品化落地</text>

  <!-- 3 key points -->
  <text x="260" y="415" font-family="Arial, sans-serif" font-size="15" fill="#04D0E6" text-anchor="middle">标杆已验证</text>
  <text x="415" y="415" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle">技术可实现</text>
  <text x="570" y="415" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle">效益有测算</text>

  <!-- Contact info box -->
  <rect x="185" y="440" width="460" height="90" fill="#005198" fill-opacity="0.12"/>
  <rect x="185" y="440" width="460" height="90" fill="none" stroke="#B9B9BD" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="415" y="468" font-family="Arial, sans-serif" font-size="14" fill="#B9B9BD" text-anchor="middle">海克斯康华东方案中心</text>
  <text x="415" y="492" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle">负责人：___________</text>
  <text x="415" y="516" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle">联系方式：___________</text>

  <!-- Website -->
  <text x="415" y="570" font-family="Arial, sans-serif" font-size="13" fill="#B9B9BD" fill-opacity="0.7" text-anchor="middle">hexagonmi.com.cn</text>

  <!-- ===== Right area: QR code ===== -->

  <!-- QR code label -->
  <text x="1010" y="190" font-family="Arial, sans-serif" font-size="13" fill="#B9B9BD" text-anchor="middle">扫码关注</text>
  <text x="1010" y="208" font-family="Arial, sans-serif" font-size="11" fill="#B9B9BD" fill-opacity="0.7" text-anchor="middle">海克斯康华东方案中心</text>

  <!-- QR code image (white background card) -->
  <rect x="870" y="215" width="280" height="280" rx="6" fill="#FFFFFF"/>
  <image href="../images/hexagon_qrcode.jpeg" x="874" y="219" width="272" height="272"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Bottom accent line -->
  <rect x="58" y="626" width="1164" height="1" fill="#B9B9BD" fill-opacity="0.3"/>

  <!-- Bottom org name -->
  <text x="640" y="650" font-family="Arial, sans-serif" font-size="13" fill="#B9B9BD" fill-opacity="0.6" text-anchor="middle">NPI阶段数字化应用解决方案  ·  接榜挂帅项目申报  ·  2026</text>

  <!-- Bottom accent -->
  <rect x="0" y="717" width="1280" height="3" fill="#005198"/>

  <!-- HEXAGON logo white — bottom right -->
  <image href="../images/hexagon_logo_white.png" x="1090" y="650" width="148" height="48"
         preserveAspectRatio="xMidYMid meet"/>

</svg>
