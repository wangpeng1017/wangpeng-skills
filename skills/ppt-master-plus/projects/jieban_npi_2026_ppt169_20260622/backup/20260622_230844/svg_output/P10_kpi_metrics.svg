    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ACBF0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5ACBF0" stop-opacity="0.6"/>
