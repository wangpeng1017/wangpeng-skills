  <text x="956" y="454" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="10" fill="#6B7F94" text-anchor="end">100%</text>
  <text x="985" y="425" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">功能清单</text>
