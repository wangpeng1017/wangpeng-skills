  <!-- Subtitle -->
  <text x="60" y="100" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" fill="#9BAABB">磁声NPI涵盖5大职能角色、3大阶段、数十项核心业务活动，平台需统一承载与协同</text>

  <!-- ===== Matrix layout ===== -->
