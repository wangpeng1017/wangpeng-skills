  <text x="442" y="560" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#B9C8D8">• CPK 报告 / FAI 报告</text>
  <text x="442" y="577" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#B9C8D8">• 测量 SOP 策划</text>
