  <line x1="872" y1="108" x2="872" y2="622" stroke="#1A4A7A" stroke-width="1"/>

  <!-- Row 1: PM — y=143 to y=238 -->
  <rect x="60" y="143" width="1170" height="95" fill="#002A52" fill-opacity="0.5"/>
  <rect x="60" y="143" width="94" height="95" fill="#003A6E" fill-opacity="0.4"/>
