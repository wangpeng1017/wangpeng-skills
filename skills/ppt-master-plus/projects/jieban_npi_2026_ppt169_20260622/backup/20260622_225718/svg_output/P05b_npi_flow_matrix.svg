  <text x="442" y="181" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#B9C8D8">• 跨部门协调 / 里程碑评审</text>
  <text x="442" y="198" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#B9C8D8">• NPI表单审批</text>
