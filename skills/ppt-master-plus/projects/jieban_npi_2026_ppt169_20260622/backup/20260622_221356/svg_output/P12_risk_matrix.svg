<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="hdrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ACBF0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#5ACBF0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5ACBF0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#00284C"/>
  <rect x="0" y="0" width="1280" height="75" fill="#003A6E" fill-opacity="0.6"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#hdrGrad)"/>

  <!-- Header -->
  <text x="60" y="695" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#6B7F94" text-anchor="middle">12</text>

  <rect x="60" y="38" width="90" height="22" rx="3" fill="#5ACBF0" fill-opacity="0.2"/>
  <rect x="60" y="38" width="90" height="22" rx="3" fill="none" stroke="#5ACBF0" stroke-width="1"/>
  <text x="105" y="53" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="12" fill="#5ACBF0" text-anchor="middle">04 风险</text>
  <text x="170" y="55" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8EDF2">实施风险识别与应对措施</text>

  <!-- ===== Row 1: High risk + Medium risk 1 ===== -->

  <!-- Risk 1: AI图纸识别准确率 (HIGH) -->
  <rect x="60" y="106" width="568" height="168" rx="10" fill="#003A6E" fill-opacity="0.6"/>
  <rect x="60" y="106" width="568" height="168" rx="10" fill="none" stroke="#5ACBF0" stroke-width="1.5"/>
  <rect x="60" y="106" width="568" height="6" rx="3" fill="#5ACBF0"/>
  <!-- Risk level badge -->
  <rect x="80" y="126" width="60" height="24" rx="4" fill="#5ACBF0"/>
  <text x="110" y="142" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">高</text>
  <!-- Icon -->
  <use data-icon="tabler-outline/alert-triangle" x="152" y="125" width="26" height="26" stroke="#5ACBF0" stroke-width="2" fill="none"/>
  <!-- Title -->
  <text x="188" y="143" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8EDF2">AI图纸识别准确率不达标</text>
  <!-- Content -->
  <line x1="80" y1="158" x2="608" y2="158" stroke="#1A4A7A" stroke-width="1"/>
  <text x="80" y="178" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB" font-weight="bold">应对措施：</text>
  <text x="80" y="198" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 分阶段交付策略：先上线NPI协同平台，AI功能后期迭代引入</text>
  <text x="80" y="218" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 设定85%兜底指标，不足处配套人工复核机制保障质量</text>
  <text x="80" y="238" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 验收前进行标准测试集独立评测，结果客观可查</text>

  <!-- Risk 2: 需求变更 (MEDIUM) -->
  <rect x="652" y="106" width="568" height="168" rx="10" fill="#003A6E" fill-opacity="0.6"/>
  <rect x="652" y="106" width="568" height="168" rx="10" fill="none" stroke="#5ACBF0" stroke-width="1.5"/>
  <rect x="652" y="106" width="568" height="6" rx="3" fill="#5ACBF0"/>
  <rect x="672" y="126" width="60" height="24" rx="4" fill="#5ACBF0"/>
  <text x="702" y="142" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#00284C" text-anchor="middle" font-weight="bold">中</text>
  <g stroke="#5ACBF0" stroke-width="2" fill="none"><rect x="744" y="125" width="26" height="26" rx="3"/><polyline points="744,155 757,151 770,155 757,159"/><polyline points="744,163 757,159 770,163 757,167"/><line x1="744" y1="151" x2="770" y2="151"/></g>
  <text x="780" y="143" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8EDF2">需求变更风险</text>
  <line x1="672" y1="158" x2="1200" y2="158" stroke="#1A4A7A" stroke-width="1"/>
  <text x="672" y="178" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB" font-weight="bold">应对措施：</text>
  <text x="672" y="198" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 整体规划期深度调研2个月，锁定核心需求基线</text>
  <text x="672" y="218" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 建立分级变更管理机制，区分重大/一般变更处理流程</text>
  <text x="672" y="238" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 基线外变更需走CCB评审，防止需求蔓延</text>

  <!-- ===== Row 2: Medium risk 2 + Low risk 1 ===== -->

  <!-- Risk 3: 客户数据质量 (MEDIUM) -->
  <rect x="60" y="290" width="568" height="168" rx="10" fill="#003A6E" fill-opacity="0.6"/>
  <rect x="60" y="290" width="568" height="168" rx="10" fill="none" stroke="#5ACBF0" stroke-width="1.5"/>
  <rect x="60" y="290" width="568" height="6" rx="3" fill="#5ACBF0"/>
  <rect x="80" y="310" width="60" height="24" rx="4" fill="#5ACBF0"/>
  <text x="110" y="326" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#00284C" text-anchor="middle" font-weight="bold">中</text>
  <use data-icon="tabler-outline/device-desktop-analytics" x="152" y="309" width="26" height="26" stroke="#5ACBF0" stroke-width="2" fill="none"/>
  <text x="188" y="327" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8EDF2">客户数据质量风险</text>
  <line x1="80" y1="342" x2="608" y2="342" stroke="#1A4A7A" stroke-width="1"/>
  <text x="80" y="362" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB" font-weight="bold">应对措施：</text>
  <text x="80" y="382" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 成立双方联合数据治理工作组，提前介入数据整备</text>
  <text x="80" y="402" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 优先处理高优先级表单数据，阶段性上线验证</text>
  <text x="80" y="422" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 制定数据质量评分标准，不达标前不进行正式割接</text>

  <!-- Risk 4: 客户人员配合 (LOW) -->
  <rect x="652" y="290" width="568" height="168" rx="10" fill="#003A6E" fill-opacity="0.6"/>
  <rect x="652" y="290" width="568" height="168" rx="10" fill="none" stroke="#5ACBF0" stroke-width="1.5"/>
  <rect x="652" y="290" width="568" height="6" rx="3" fill="#5ACBF0"/>
  <rect x="672" y="310" width="60" height="24" rx="4" fill="#5ACBF0" fill-opacity="0.7"/>
  <text x="702" y="326" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#00284C" text-anchor="middle" font-weight="bold">低</text>
  <use data-icon="tabler-outline/users" x="744" y="309" width="26" height="26" stroke="#5ACBF0" stroke-width="2" fill="none"/>
  <text x="780" y="327" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8EDF2">客户人员配合不足</text>
  <line x1="672" y1="342" x2="1200" y2="342" stroke="#1A4A7A" stroke-width="1"/>
  <text x="672" y="362" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB" font-weight="bold">应对措施：</text>
  <text x="672" y="382" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 签订项目责任书，明确双方配合责任与资源投入</text>
  <text x="672" y="402" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 设置里程碑节点检查，客户配合情况纳入进度评估</text>
  <text x="672" y="422" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 例会从双周改为单周，加强沟通频率</text>

  <!-- ===== Row 3: Low risk 2 + Summary ===== -->

  <!-- Risk 5: 春节用工风险 (LOW) -->
  <rect x="60" y="474" width="568" height="168" rx="10" fill="#003A6E" fill-opacity="0.6"/>
  <rect x="60" y="474" width="568" height="168" rx="10" fill="none" stroke="#5ACBF0" stroke-width="1.5"/>
  <rect x="60" y="474" width="568" height="6" rx="3" fill="#5ACBF0"/>
  <rect x="80" y="494" width="60" height="24" rx="4" fill="#5ACBF0" fill-opacity="0.7"/>
  <text x="110" y="510" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#00284C" text-anchor="middle" font-weight="bold">低</text>
  <use data-icon="tabler-outline/clock" x="152" y="493" width="26" height="26" stroke="#5ACBF0" stroke-width="2" fill="none"/>
  <text x="188" y="511" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8EDF2">春节用工风险</text>
  <line x1="80" y1="526" x2="608" y2="526" stroke="#1A4A7A" stroke-width="1"/>
  <text x="80" y="546" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB" font-weight="bold">应对措施：</text>
  <text x="80" y="566" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 项目排期规避春节前后1个月的关键节点</text>
  <text x="80" y="586" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 提前完成知识沉淀文档，降低人员变动依赖</text>
  <text x="80" y="606" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#9BAABB">• 关键角色备份机制，确保核心岗位覆盖</text>

  <!-- Summary card -->
  <rect x="652" y="474" width="568" height="168" rx="10" fill="#003A6E" fill-opacity="0.5"/>
  <rect x="652" y="474" width="568" height="168" rx="10" fill="none" stroke="#5ACBF0" stroke-width="1.5"/>
  <rect x="652" y="474" width="568" height="6" rx="3" fill="#5ACBF0"/>
  <text x="936" y="520" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8EDF2" text-anchor="middle">风险整体评估</text>
  <!-- 3 KPI numbers -->
  <text x="736" y="580" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="36" font-weight="bold" fill="#5ACBF0" text-anchor="middle">1</text>
  <text x="736" y="602" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9BAABB" text-anchor="middle">高风险项</text>
  <line x1="812" y1="550" x2="812" y2="620" stroke="#1A4A7A" stroke-width="1"/>
  <text x="937" y="580" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="36" font-weight="bold" fill="#5ACBF0" text-anchor="middle">2</text>
  <text x="937" y="602" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9BAABB" text-anchor="middle">中风险项</text>
  <line x1="1062" y1="550" x2="1062" y2="620" stroke="#1A4A7A" stroke-width="1"/>
  <text x="1137" y="580" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="36" font-weight="bold" fill="#5ACBF0" text-anchor="middle">2</text>
  <text x="1137" y="602" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="13" fill="#9BAABB" text-anchor="middle">低风险项</text>
  <!-- All addressed -->
  <text x="936" y="652" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#5ACBF0" text-anchor="middle">✓ 所有风险均已制定应对措施</text>

  <!-- Footer -->
  <line x1="60" y1="700" x2="1220" y2="700" stroke="#1A4A7A" stroke-width="1"/>
  <!-- HEXAGON logo white — bottom right -->
  <image href="../images/hexagon_logo_white.png" x="1090" y="650" width="148" height="48" preserveAspectRatio="xMidYMid meet"/>

</svg>
