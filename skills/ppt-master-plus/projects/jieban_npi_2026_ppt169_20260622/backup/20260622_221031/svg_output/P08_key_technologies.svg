  <text x="60" y="126" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="15" fill="#9BAABB">图纸智能识别、知识库RAG检索、多模态文档生成三项技术协同驱动NPI全链路AI辅助</text>

