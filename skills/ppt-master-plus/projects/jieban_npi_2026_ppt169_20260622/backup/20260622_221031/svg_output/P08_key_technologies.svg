  <text x="1020" y="528" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="26" font-weight="bold" fill="#5ACBF0" text-anchor="middle">≥ 30%</text>

