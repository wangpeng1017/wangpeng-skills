      <stop offset="0%" stop-color="#5ACBF0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#5ACBF0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5ACBF0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#00284C"/>

  <!-- Right accent band -->
<!-- Giant decorative "04" -->
  <text x="640" y="581" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="520" font-weight="bold" fill="#5ACBF0" fill-opacity="0.06">04</text>

  <!-- Background decor: shield outline -->
  <path d="M960,100 L1060,140 L1060,260 Q1060,340 960,380 Q860,340 860,260 L860,140 Z" fill="none" stroke="#5ACBF0" stroke-width="1.5" stroke-opacity="0.2"/>
  <path d="M960,130 L1040,162 L1040,262 Q1040,326 960,358 Q880,326 880,262 L880,162 Z" fill="none" stroke="#5ACBF0" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Background glow -->
  <ellipse cx="250" cy="351" rx="300" ry="220" fill="#003A6E" fill-opacity="0.2"/>

  <!-- Left decoration line -->
  <rect x="60" y="191" width="5" height="260" rx="3" fill="#5ACBF0"/>

  <!-- Chapter badge -->
  <rect x="80" y="191" width="120" height="32" rx="4" fill="#5ACBF0" fill-opacity="0.15"/>
  <rect x="80" y="191" width="120" height="32" rx="4" fill="none" stroke="#5ACBF0" stroke-width="1.5"/>
  <text x="140" y="212" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="14" fill="#5ACBF0" text-anchor="middle">CHAPTER 04</text>

  <!-- Large chapter number -->
  <text x="80" y="351" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="110" font-weight="bold" fill="#5ACBF0">04</text>

  <!-- Accent line -->
  <rect x="80" y="369" width="500" height="4" fill="url(#accentLine)"/>

  <!-- Chapter title -->
  <text x="80" y="423" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="48" font-weight="bold" fill="#E8EDF2">实施风险及团队保障</text>

  <!-- Subtitle -->
  <text x="80" y="471" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="20" fill="#9BAABB">识别5大主要风险并制定应对措施，8人专业团队保障高质量交付</text>

  <!-- Bottom bullets -->
  <line x1="80" y1="507" x2="580" y2="507" stroke="#1A4A7A" stroke-width="1"/>

  <circle cx="94" cy="536" r="4" fill="#5ACBF0"/>
  <text x="110" y="542" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#9BAABB">5大风险均有明确应对策略，技术风险分阶段交付化解</text>

  <circle cx="94" cy="566" r="4" fill="#5ACBF0"/>
  <text x="110" y="572" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="16" fill="#9BAABB">实战团队+指导委员会双重保障，磁声标杆经验直接复用</text>

  <!-- Right accent bar label -->
  <text x="1257" y="361" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" transform="rotate(90,1257,370)">RISK &amp; TEAM ASSURANCE</text>

  <!-- Footer -->
