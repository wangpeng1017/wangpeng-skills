      <text x="445" y="320" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#4B5563">{{PLAN_BREAK}}</text>
    </g>
    <g>
      <rect x="538" y="244" width="130" height="120" rx="4" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="603" y="278" text-anchor="middle" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#0B2F3A">生产</text>
      <text x="603" y="320" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#4B5563">{{MFG_BREAK}}</text>
      <rect x="544" y="344" width="118" height="26" rx="3" fill="#4295B6"/>
      <text x="603" y="362" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#FFFFFF">关键断点</text>
    </g>
    <g>
      <rect x="696" y="244" width="130" height="120" rx="4" fill="#F3F7FA" stroke="#D2D3D4"/>
      <text x="761" y="278" text-anchor="middle" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#0B2F3A">质量</text>
      <text x="761" y="320" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#4B5563">{{QUALITY_BREAK}}</text>
    </g>
    <g>
