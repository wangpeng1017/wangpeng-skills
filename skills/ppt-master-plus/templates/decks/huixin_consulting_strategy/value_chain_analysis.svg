<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="4" fill="#4295B6"/>
  <image x="1082" y="22" width="134" height="32" preserveAspectRatio="xMinYMin meet" href="images/huixin_logo_light.png"/>
  <text x="64" y="48" font-family="Microsoft YaHei" font-size="13" fill="#4B5563">VALUE CHAIN ANALYSIS</text>
  <text x="64" y="116" font-family="Microsoft YaHei" font-size="34" font-weight="bold" fill="#0B2F3A">{{PAGE_TITLE}}</text>
  <text x="64" y="154" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#4295B6">{{KEY_MESSAGE}}</text>
  <line x1="64" y1="178" x2="1216" y2="178" stroke="#D2D3D4"/>
  <defs>
    <marker id="arrow-vc" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4295B6"/>
    </marker>
  </defs>
  <g id="chain">
    <line x1="116" y1="316" x2="1160" y2="316" stroke="#4295B6" stroke-width="3" marker-end="url(#arrow-vc)"/>
    <g>
