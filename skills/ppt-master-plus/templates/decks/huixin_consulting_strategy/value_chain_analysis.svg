      <text x="129" y="278" text-anchor="middle" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#0B2F3A">销售</text>
      <text x="129" y="320" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#4B5563">{{SALES_BREAK}}</text>
      <rect x="70" y="344" width="118" height="26" rx="3" fill="#B0D776"/>
      <text x="129" y="362" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#0B2F3A">机会点</text>
    </g>
    <g>
