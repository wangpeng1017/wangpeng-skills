    <text x="88" y="512" font-family="Microsoft YaHei" font-size="14" fill="#4B5563">{{VALUE_BREAKPOINT}}</text>
    <rect x="465" y="444" width="350" height="94" rx="4" fill="#FFFFFF" stroke="#D2D3D4"/>
    <text x="489" y="478" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#0B2F3A">根因判断</text>
    <text x="489" y="512" font-family="Microsoft YaHei" font-size="14" fill="#4B5563">{{ROOT_CAUSE}}</text>
    <rect x="866" y="444" width="350" height="94" rx="4" fill="#F3F7FA" stroke="#D2D3D4"/>
    <text x="890" y="478" font-family="Microsoft YaHei" font-size="17" font-weight="bold" fill="#0B2F3A">改进主线</text>
    <text x="890" y="512" font-family="Microsoft YaHei" font-size="14" fill="#4B5563">{{IMPROVEMENT_THEME}}</text>
  </g>
  <text x="64" y="674" font-family="Microsoft YaHei" font-size="11" fill="#4B5563">Huixin Consulting Strategy Template</text>
