    <rect x="272" y="244" width="208" height="30" fill="#BFD7E2"/>
    <rect x="480" y="244" width="208" height="30" fill="#8EBED2"/>
    <rect x="688" y="244" width="208" height="30" fill="#4295B6"/>
    <rect x="896" y="244" width="208" height="30" fill="#B0D776"/>
    <text x="168" y="265" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#0B2F3A">L1 初始</text>
    <text x="376" y="265" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#0B2F3A">L2 规范</text>
    <text x="584" y="265" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#0B2F3A">L3 集成</text>
    <text x="792" y="265" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#FFFFFF">L4 智能</text>
    <text x="1000" y="265" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#0B2F3A">L5 生态</text>
