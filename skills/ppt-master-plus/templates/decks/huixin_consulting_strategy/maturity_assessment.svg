    <circle cx="764" cy="470" r="8" fill="#0B2F3A"/>
    <text x="1038" y="476" font-family="Microsoft YaHei" font-size="14" fill="#4B5563">{{SCORE_SYSTEM}}</text>
    <text x="88" y="526" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#0B2F3A">组织</text>
    <rect x="190" y="506" width="820" height="28" fill="#F3F7FA" stroke="#D2D3D4"/>
    <rect x="190" y="506" width="246" height="28" fill="#BFD7E2"/>
    <circle cx="436" cy="520" r="8" fill="#0B2F3A"/>
    <text x="1038" y="526" font-family="Microsoft YaHei" font-size="14" fill="#4B5563">{{SCORE_ORG}}</text>
    <text x="88" y="576" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#0B2F3A">运营</text>
    <rect x="190" y="556" width="820" height="28" fill="#F3F7FA" stroke="#D2D3D4"/>
