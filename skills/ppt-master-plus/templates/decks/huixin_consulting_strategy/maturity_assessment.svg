  <rect x="1128" y="306" width="88" height="278" rx="4" fill="#0B2F3A"/>
  <text x="1172" y="356" text-anchor="middle" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#FFFFFF">目标</text>
  <text x="1172" y="392" text-anchor="middle" font-family="Microsoft YaHei" font-size="28" font-weight="bold" fill="#B0D776">{{TARGET_LEVEL}}</text>
  <text x="1172" y="452" text-anchor="middle" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#FFFFFF">当前</text>
  <text x="1172" y="488" text-anchor="middle" font-family="Microsoft YaHei" font-size="28" font-weight="bold" fill="#FFFFFF">{{CURRENT_LEVEL}}</text>
  <text x="64" y="674" font-family="Microsoft YaHei" font-size="11" fill="#4B5563">Huixin Consulting Strategy Template</text>
