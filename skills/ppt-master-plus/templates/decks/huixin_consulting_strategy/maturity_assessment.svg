    <text x="1038" y="326" font-family="Microsoft YaHei" font-size="14" fill="#4B5563">{{SCORE_STRATEGY}}</text>
    <text x="88" y="376" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#0B2F3A">流程</text>
    <rect x="190" y="356" width="820" height="28" fill="#F3F7FA" stroke="#D2D3D4"/>
