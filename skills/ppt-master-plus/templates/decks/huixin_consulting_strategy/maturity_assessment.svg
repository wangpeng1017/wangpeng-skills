    <text x="88" y="476" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#0B2F3A">系统</text>
    <rect x="190" y="456" width="820" height="28" fill="#F3F7FA" stroke="#D2D3D4"/>
