  <text x="72" y="160" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#4295B6">{{KEY_MESSAGE}}</text>

  <rect x="72" y="198" width="1136" height="420" rx="14" fill="#F3F7FA" stroke="#D2D3D4"/>
  <g id="left-labels" font-family="Microsoft YaHei, Arial, sans-serif" font-weight="700" text-anchor="middle">
    <rect x="94" y="250" width="74" height="78" rx="10" fill="#4295B6"/>
    <text x="131" y="282" font-size="17" fill="#FFFFFF"><tspan x="131">阶段</tspan><tspan x="131" dy="24">目标</tspan></text>
    <rect x="94" y="340" width="74" height="78" rx="10" fill="#4295B6" fill-opacity="0.86"/>
    <text x="131" y="372" font-size="17" fill="#FFFFFF"><tspan x="131">重点</tspan><tspan x="131" dy="24">关注</tspan></text>
    <rect x="94" y="430" width="74" height="88" rx="10" fill="#0B2F3A"/>
    <text x="131" y="468" font-size="17" fill="#FFFFFF"><tspan x="131">建设</tspan><tspan x="131" dy="24">策略</tspan></text>
    <rect x="94" y="530" width="74" height="54" rx="10" fill="#B0D776"/>
    <text x="131" y="563" font-size="17" fill="#0B2F3A">交付物</text>
  </g>

  <g id="roadmap-line" fill="none" stroke="#4295B6" stroke-width="2" marker-end="url(#stageArrow)">
    <path d="M226 224 L448 224"/>
    <path d="M494 224 L716 224"/>
    <path d="M762 224 L984 224"/>
    <path d="M1030 224 L1170 224"/>
  </g>

