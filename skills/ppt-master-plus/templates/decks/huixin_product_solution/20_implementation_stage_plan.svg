  <line x1="72" y1="652" x2="1208" y2="652" stroke="#D2D3D4" stroke-width="1.5"/>
  <text x="72" y="686" fill="#4B5563" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">Source: {{SOURCE}}</text>
  <text x="1208" y="686" text-anchor="end" fill="#4B5563" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">{{PAGE_NUM}}</text>
