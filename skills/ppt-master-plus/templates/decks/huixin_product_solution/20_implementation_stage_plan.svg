    <text x="210" y="520" font-size="14" fill="#0B2F3A">• {{PHASE_1_STRATEGY_1}}</text>
    <text x="210" y="548" font-size="14" fill="#0B2F3A">• {{PHASE_1_STRATEGY_2}}</text>
    <text x="210" y="572" font-size="12" fill="#4295B6">{{PHASE_1_DELIVERABLE}}</text>
