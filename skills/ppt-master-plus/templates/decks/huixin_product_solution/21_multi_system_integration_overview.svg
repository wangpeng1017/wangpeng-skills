<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="10" fill="#4295B6"/>
  <rect x="0" y="10" width="320" height="5" fill="#B0D776"/>
  <image href="images/huixin_logo_light.png" x="1036" y="30" width="170" height="40" preserveAspectRatio="xMidYMid meet"/>
  <text x="72" y="70" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#4295B6">系统架构总览</text>
  <text x="72" y="124" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="700" fill="#0B2F3A">多系统一体化集成总览</text>
  <text x="72" y="160" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#4295B6">跨系统流程、主数据与业务执行数据协同闭环</text>

  <g id="main-architecture" data-role="architecture" data-bbox="60,188,1160,330" transform="translate(0 32)">
    <rect x="60" y="156" width="820" height="330" rx="14" fill="#F8FAFC" stroke="#D2D3D4"/>
    <text x="116" y="188" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#111111">上游系统</text>

    <g id="upstream-systems" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
      <rect x="78" y="210" width="162" height="62" rx="8" fill="#FFFFFF" stroke="#D2D3D4"/>
      <rect x="96" y="228" width="38" height="28" rx="3" fill="#EFF6FA" stroke="#65737E" stroke-width="2"/>
      <polyline points="101,248 109,242 116,246 126,235 132,239" fill="none" stroke="#65737E" stroke-width="2"/>
      <text x="150" y="247" font-size="16" font-weight="700" fill="#111111">外部系统A</text>
      <text x="150" y="267" font-size="11" fill="#6B7280">订单 / 主数据</text>

      <rect x="78" y="286" width="162" height="62" rx="8" fill="#FFFFFF" stroke="#D2D3D4"/>
      <path d="M98 301 L122 301 L136 315 L136 333 L98 333 Z" fill="#EFF6FA" stroke="#65737E" stroke-width="2"/>
      <path d="M122 301 L122 315 L136 315" fill="none" stroke="#65737E" stroke-width="2"/>
      <circle cx="131" cy="331" r="8" fill="#FFFFFF" stroke="#65737E" stroke-width="2"/>
      <text x="150" y="323" font-size="16" font-weight="700" fill="#111111">外部系统B</text>
      <text x="150" y="343" font-size="11" fill="#6B7280">设计 / 标准 / 方案</text>

      <rect x="78" y="362" width="162" height="62" rx="8" fill="#FFFFFF" stroke="#D2D3D4"/>
      <circle cx="118" cy="387" r="24" fill="#EFF6FA" stroke="#65737E" stroke-width="2"/>
      <path d="M104 387 Q118 374 132 387" fill="none" stroke="#65737E" stroke-width="3"/>
      <path d="M110 395 Q118 388 126 395" fill="none" stroke="#65737E" stroke-width="3"/>
      <circle cx="118" cy="402" r="3" fill="#65737E"/>
      <text x="150" y="399" font-size="16" font-weight="700" fill="#111111">现场系统C</text>
      <text x="150" y="419" font-size="11" fill="#6B7280">执行 / 参数 / 状态</text>
    </g>

    <g id="integration-arrows" stroke="#4295B6" stroke-width="2.4" fill="none">
      <line x1="246" y1="240" x2="312" y2="240"/>
      <polygon points="312,240 300,234 300,246" fill="#4295B6"/>
      <line x1="246" y1="316" x2="312" y2="316"/>
      <polygon points="312,316 300,310 300,322" fill="#4295B6"/>
      <line x1="246" y1="392" x2="312" y2="392" stroke-dasharray="5 5"/>
      <polygon points="312,392 300,386 300,398" fill="#4295B6"/>
    </g>

    <text x="266" y="224" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4B5563">业务主数据</text>
    <text x="266" y="300" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4B5563">结构/规则</text>
    <text x="266" y="376" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4B5563">执行数据</text>

    <rect x="320" y="188" width="532" height="256" rx="14" fill="#FFFFFF" stroke="#4295B6" stroke-width="1.5"/>

    <g id="plm-core" data-role="platform" data-bbox="342,204,226,218" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
      <rect x="342" y="204" width="226" height="218" rx="10" fill="#F6FBFE" stroke="#AFC8D4"/>
      <rect x="342" y="204" width="226" height="38" rx="10" fill="#4295B6"/>
      <text x="456" y="230" font-size="19" font-weight="700" fill="#FFFFFF" text-anchor="middle">核心系统一</text>
      <g font-size="14" font-weight="700" fill="#111111">
        <rect x="362" y="258" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#AFC8D4"/>
        <text x="406" y="281" text-anchor="middle">业务对象</text>
        <rect x="460" y="258" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#AFC8D4"/>
        <text x="504" y="281" text-anchor="middle">主数据</text>
        <rect x="362" y="308" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#AFC8D4"/>
        <text x="406" y="331" text-anchor="middle">规则配置</text>
        <rect x="460" y="308" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#AFC8D4"/>
        <text x="504" y="331" text-anchor="middle">变更控制</text>
        <rect x="362" y="358" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#AFC8D4"/>
        <text x="406" y="381" text-anchor="middle">流程发布</text>
        <rect x="460" y="358" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#AFC8D4"/>
        <text x="504" y="381" text-anchor="middle">版本发布</text>
      </g>
    </g>

    <g id="qms-core" data-role="platform" data-bbox="604,204,226,218" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
      <rect x="604" y="204" width="226" height="218" rx="10" fill="#F9FCF4" stroke="#B0D776"/>
      <rect x="604" y="204" width="226" height="38" rx="10" fill="#6EAF45"/>
      <text x="716" y="230" font-size="19" font-weight="700" fill="#FFFFFF" text-anchor="middle">核心系统二</text>
      <g font-size="14" font-weight="700" fill="#111111">
        <rect x="624" y="258" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#B0D776"/>
        <text x="668" y="281" text-anchor="middle">业务策划</text>
        <rect x="722" y="258" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#B0D776"/>
        <text x="766" y="281" text-anchor="middle">执行标准</text>
        <rect x="624" y="308" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#B0D776"/>
        <text x="668" y="331" text-anchor="middle">业务执行</text>
        <rect x="722" y="308" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#B0D776"/>
        <text x="766" y="331" text-anchor="middle">过程控制</text>
        <rect x="624" y="358" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#B0D776"/>
        <text x="668" y="381" text-anchor="middle">异常闭环</text>
        <rect x="722" y="358" width="88" height="36" rx="7" fill="#FFFFFF" stroke="#B0D776"/>
        <text x="766" y="381" text-anchor="middle">追溯分析</text>
      </g>
    </g>

    <g id="plm-qms-sync" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
      <line x1="570" y1="292" x2="602" y2="292" stroke="#4295B6" stroke-width="3"/>
      <polygon points="602,292 590,286 590,298" fill="#4295B6"/>
      <line x1="602" y1="340" x2="570" y2="340" stroke="#6EAF45" stroke-width="3"/>
      <polygon points="570,340 582,334 582,346" fill="#6EAF45"/>
