  <g id="right-execution" data-role="right-system-groups" data-bbox="920,206,300,282" transform="translate(0 32)" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <rect x="940" y="184" width="258" height="104" rx="10" fill="#FBFDFF" stroke="#4295B6" stroke-dasharray="4 4"/>
    <rect x="1004" y="170" width="96" height="30" rx="15" fill="#4295B6"/>
    <text x="1052" y="191" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">业务协同</text>
    <g font-size="12" font-weight="700" fill="#111111">
      <rect x="958" y="210" width="48" height="56" rx="7" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="982" y="244" text-anchor="middle">计划</text>
      <rect x="1020" y="210" width="48" height="56" rx="7" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="1044" y="244" text-anchor="middle">执行</text>
      <rect x="1082" y="210" width="48" height="56" rx="7" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="1106" y="244" text-anchor="middle">审核</text>
      <rect x="1144" y="210" width="38" height="56" rx="7" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="1163" y="244" text-anchor="middle">变更</text>
    </g>

    <rect x="940" y="332" width="258" height="104" rx="10" fill="#FCFFF8" stroke="#B0D776" stroke-dasharray="4 4"/>
    <rect x="1004" y="318" width="96" height="30" rx="15" fill="#6EAF45"/>
    <text x="1052" y="339" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">数据闭环</text>
    <g font-size="12" font-weight="700" fill="#111111">
      <rect x="958" y="358" width="48" height="56" rx="7" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="982" y="392" text-anchor="middle">采集</text>
      <rect x="1020" y="358" width="48" height="56" rx="7" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="1044" y="392" text-anchor="middle">校验</text>
      <rect x="1082" y="358" width="48" height="56" rx="7" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="1106" y="392" text-anchor="middle">分析</text>
      <rect x="1144" y="358" width="38" height="56" rx="7" fill="#FFFFFF" stroke="#D2D3D4"/>
      <text x="1163" y="392" text-anchor="middle">闭环</text>
    </g>

    <line x1="852" y1="246" x2="930" y2="246" stroke="#4295B6" stroke-width="2.3"/>
    <polygon points="930,246 918,240 918,252" fill="#4295B6"/>
    <line x1="930" y1="384" x2="852" y2="384" stroke="#6EAF45" stroke-width="2.3" stroke-dasharray="5 5"/>
    <polygon points="852,384 864,378 864,390" fill="#6EAF45"/>
    <text x="888" y="228" font-size="12" fill="#4B5563">业务输出</text>
    <text x="888" y="370" font-size="12" fill="#4B5563">数据反馈</text>
  </g>

  <g id="legend" transform="translate(0 18)" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#4B5563">
    <line x1="452" y1="506" x2="492" y2="506" stroke="#4295B6" stroke-width="3"/>
    <polygon points="492,506 482,501 482,511" fill="#4295B6"/>
    <text x="506" y="511">主数据流</text>
    <line x1="620" y1="506" x2="660" y2="506" stroke="#6EAF45" stroke-width="3"/>
    <polygon points="660,506 650,501 650,511" fill="#6EAF45"/>
    <text x="674" y="511">闭环反馈流</text>
    <line x1="780" y1="506" x2="820" y2="506" stroke="#4295B6" stroke-width="2" stroke-dasharray="5 5"/>
    <polygon points="820,506 810,501 810,511" fill="#4295B6"/>
    <text x="834" y="511">现场数据反馈</text>
  </g>

  <g id="process-flow" data-role="process" data-bbox="60,542,1160,110" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <rect x="60" y="542" width="1160" height="110" rx="10" fill="#FFFFFF" stroke="#D2D3D4" stroke-dasharray="4 4"/>
    <text x="86" y="572" font-size="16" font-weight="700" fill="#111111">端到端业务流程</text>
    <g font-size="12" font-weight="700" fill="#111111">
      <rect x="86" y="586" width="92" height="48" rx="8" fill="#F7FBFE" stroke="#AFC8D4"/>
      <circle cx="102" cy="602" r="10" fill="#4295B6"/><text x="102" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">1</text>
      <text x="132" y="613" text-anchor="middle">业务触发</text>

      <rect x="210" y="586" width="92" height="48" rx="8" fill="#F7FBFE" stroke="#AFC8D4"/>
      <circle cx="226" cy="602" r="10" fill="#4295B6"/><text x="226" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">2</text>
      <text x="256" y="613" text-anchor="middle">数据建模</text>

      <rect x="334" y="586" width="92" height="48" rx="8" fill="#F7FBFE" stroke="#AFC8D4"/>
      <circle cx="350" cy="602" r="10" fill="#4295B6"/><text x="350" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">3</text>
      <text x="380" y="613" text-anchor="middle">规则发布</text>

      <rect x="458" y="586" width="92" height="48" rx="8" fill="#FCFFF8" stroke="#B0D776"/>
      <circle cx="474" cy="602" r="10" fill="#6EAF45"/><text x="474" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">4</text>
      <text x="504" y="613" text-anchor="middle">协同计划</text>

      <rect x="582" y="586" width="92" height="48" rx="8" fill="#FCFFF8" stroke="#B0D776"/>
      <circle cx="598" cy="602" r="10" fill="#6EAF45"/><text x="598" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">5</text>
      <text x="628" y="613" text-anchor="middle">业务执行</text>

      <rect x="706" y="586" width="92" height="48" rx="8" fill="#F7FBFE" stroke="#AFC8D4"/>
      <circle cx="722" cy="602" r="10" fill="#4295B6"/><text x="722" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">6</text>
      <text x="752" y="613" text-anchor="middle">问题反馈</text>

      <rect x="830" y="586" width="92" height="48" rx="8" fill="#FCFFF8" stroke="#B0D776"/>
      <circle cx="846" cy="602" r="10" fill="#6EAF45"/><text x="846" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">7</text>
      <text x="876" y="613" text-anchor="middle">闭环处理</text>

      <rect x="954" y="586" width="92" height="48" rx="8" fill="#F7FBFE" stroke="#AFC8D4"/>
      <circle cx="970" cy="602" r="10" fill="#4295B6"/><text x="970" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">8</text>
      <text x="1000" y="613" text-anchor="middle">变更回写</text>

      <rect x="1078" y="586" width="92" height="48" rx="8" fill="#FCFFF8" stroke="#B0D776"/>
      <circle cx="1094" cy="602" r="10" fill="#6EAF45"/><text x="1094" y="607" font-size="11" fill="#FFFFFF" text-anchor="middle">9</text>
      <text x="1124" y="613" text-anchor="middle">数据看板</text>
    </g>
    <g fill="#4295B6">
      <polygon points="198,610 186,604 186,616"/>
      <polygon points="322,610 310,604 310,616"/>
      <polygon points="446,610 434,604 434,616"/>
      <polygon points="570,610 558,604 558,616"/>
      <polygon points="694,610 682,604 682,616"/>
      <polygon points="818,610 806,604 806,616"/>
      <polygon points="942,610 930,604 930,616"/>
      <polygon points="1066,610 1054,604 1054,616"/>
    </g>
  </g>

  <polygon points="1194,532 1280,488 1280,565 1194,610" fill="#0F95B6"/>
  <polygon points="1030,720 1280,560 1280,640 1154,720" fill="#B0D776"/>
  <polygon points="1214,658 1280,620 1280,650 1244,672" fill="#D2D3D4"/>
</svg>
