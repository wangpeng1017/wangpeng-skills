<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="5" fill="#4295B6"/>
  <text x="64" y="45" fill="#4B5563" font-family="Microsoft YaHei" font-size="13">10 / FINANCIAL ANALYSIS</text>
  <image href="images/huixin_logo_light.png" x="1030" y="18" width="170" height="40" preserveAspectRatio="xMidYMid meet"/>
  <text x="64" y="112" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="36" font-weight="700">{{PAGE_TITLE}}</text>
  <text x="64" y="152" fill="#4295B6" font-family="Microsoft YaHei" font-size="19" font-weight="700">{{KEY_MESSAGE}}</text>

  <g id="kpi-row">
    <rect x="64" y="188" width="248" height="108" rx="4" fill="#F3F7FA" stroke="#D2D3D4"/>
    <text x="88" y="224" fill="#4B5563" font-family="Microsoft YaHei" font-size="14">收入</text>
    <text x="88" y="270" fill="#4295B6" font-family="Microsoft YaHei" font-size="40" font-weight="700">{{REVENUE}}</text>
    <text x="224" y="270" fill="#B0D776" font-family="Microsoft YaHei" font-size="16" font-weight="700">{{REVENUE_YOY}}</text>
    <rect x="340" y="188" width="248" height="108" rx="4" fill="#F3F7FA" stroke="#D2D3D4"/>
    <text x="364" y="224" fill="#4B5563" font-family="Microsoft YaHei" font-size="14">毛利率</text>
    <text x="364" y="270" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="40" font-weight="700">{{GROSS_MARGIN}}</text>
    <text x="500" y="270" fill="#B0D776" font-family="Microsoft YaHei" font-size="16" font-weight="700">{{MARGIN_CHANGE}}</text>
    <rect x="616" y="188" width="248" height="108" rx="4" fill="#F3F7FA" stroke="#D2D3D4"/>
    <text x="640" y="224" fill="#4B5563" font-family="Microsoft YaHei" font-size="14">费用率</text>
    <text x="640" y="270" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="40" font-weight="700">{{EXPENSE_RATE}}</text>
    <text x="776" y="270" fill="#D8665B" font-family="Microsoft YaHei" font-size="16" font-weight="700">{{EXPENSE_CHANGE}}</text>
    <rect x="892" y="188" width="324" height="108" rx="4" fill="#0B2F3A"/>
    <text x="916" y="224" fill="#D2D3D4" font-family="Microsoft YaHei" font-size="14">净利润</text>
    <text x="916" y="270" fill="#B0D776" font-family="Microsoft YaHei" font-size="40" font-weight="700">{{NET_PROFIT}}</text>
    <text x="1074" y="270" fill="#FFFFFF" font-family="Microsoft YaHei" font-size="16" font-weight="700">{{PROFIT_NOTE}}</text>
  </g>

  <g id="waterfall">
    <rect x="64" y="334" width="640" height="246" rx="4" fill="#FFFFFF" stroke="#D2D3D4"/>
    <text x="88" y="370" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="20" font-weight="700">利润变化拆解</text>
    <line x1="110" y1="526" x2="660" y2="526" stroke="#D2D3D4"/>
    <rect x="126" y="458" width="72" height="68" fill="#4295B6"/>
    <rect x="226" y="420" width="72" height="106" fill="#B0D776"/>
    <rect x="326" y="474" width="72" height="52" fill="#D8665B"/>
    <rect x="426" y="440" width="72" height="86" fill="#B0D776"/>
    <rect x="526" y="486" width="72" height="40" fill="#D8665B"/>
    <text x="162" y="552" text-anchor="middle" fill="#4B5563" font-family="Microsoft YaHei" font-size="13">期初</text>
    <text x="262" y="552" text-anchor="middle" fill="#4B5563" font-family="Microsoft YaHei" font-size="13">收入</text>
    <text x="362" y="552" text-anchor="middle" fill="#4B5563" font-family="Microsoft YaHei" font-size="13">成本</text>
    <text x="462" y="552" text-anchor="middle" fill="#4B5563" font-family="Microsoft YaHei" font-size="13">毛利</text>
    <text x="562" y="552" text-anchor="middle" fill="#4B5563" font-family="Microsoft YaHei" font-size="13">费用</text>
    <text x="162" y="446" text-anchor="middle" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{BASE_PROFIT}}</text>
    <text x="262" y="408" text-anchor="middle" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{REVENUE_IMPACT}}</text>
    <text x="362" y="462" text-anchor="middle" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{COST_IMPACT}}</text>
    <text x="462" y="428" text-anchor="middle" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{MARGIN_IMPACT}}</text>
    <text x="562" y="474" text-anchor="middle" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{EXPENSE_IMPACT}}</text>
  </g>

  <g id="profit-table">
    <rect x="736" y="334" width="480" height="246" fill="#FFFFFF" stroke="#D2D3D4"/>
    <text x="760" y="370" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="20" font-weight="700">财务明细表</text>
    <rect x="760" y="390" width="432" height="34" fill="#0B2F3A"/>
    <text x="786" y="413" fill="#FFFFFF" font-family="Microsoft YaHei" font-size="14" font-weight="700">科目</text>
    <text x="938" y="413" fill="#FFFFFF" font-family="Microsoft YaHei" font-size="14" font-weight="700">本期</text>
    <text x="1044" y="413" fill="#FFFFFF" font-family="Microsoft YaHei" font-size="14" font-weight="700">预算</text>
    <text x="1136" y="413" fill="#FFFFFF" font-family="Microsoft YaHei" font-size="14" font-weight="700">偏差</text>
    <rect x="760" y="424" width="432" height="32" fill="#F3F7FA"/>
    <rect x="760" y="488" width="432" height="32" fill="#F3F7FA"/>
    <rect x="760" y="552" width="432" height="28" fill="#F3F7FA"/>
    <text x="786" y="446" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">营业收入</text>
    <text x="938" y="446" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">{{REV_ACTUAL}}</text>
    <text x="1044" y="446" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">{{REV_BUDGET}}</text>
    <text x="1136" y="446" fill="#B0D776" font-family="Microsoft YaHei" font-size="14">{{REV_VAR}}</text>
    <text x="786" y="478" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">毛利</text>
    <text x="938" y="478" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">{{GM_ACTUAL}}</text>
    <text x="1044" y="478" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">{{GM_BUDGET}}</text>
    <text x="1136" y="478" fill="#B0D776" font-family="Microsoft YaHei" font-size="14">{{GM_VAR}}</text>
    <text x="786" y="510" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">销售费用</text>
    <text x="938" y="510" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">{{SALES_EXP}}</text>
    <text x="1044" y="510" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">{{SALES_BUDGET}}</text>
    <text x="1136" y="510" fill="#D8665B" font-family="Microsoft YaHei" font-size="14">{{SALES_VAR}}</text>
    <text x="786" y="542" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">净利润</text>
    <text x="938" y="542" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">{{NP_ACTUAL}}</text>
    <text x="1044" y="542" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="14">{{NP_BUDGET}}</text>
    <text x="1136" y="542" fill="#B0D776" font-family="Microsoft YaHei" font-size="14">{{NP_VAR}}</text>
  </g>

  <text x="64" y="674" fill="#4B5563" font-family="Microsoft YaHei" font-size="11">Huixin Management Report Template</text>
  <text x="1216" y="674" text-anchor="end" fill="#4B5563" font-family="Microsoft YaHei" font-size="12">{{PAGE_NUM}}</text>
</svg>
