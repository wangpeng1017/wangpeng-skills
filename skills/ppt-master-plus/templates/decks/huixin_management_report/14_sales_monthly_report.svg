  <g id="new-sign-table">
    <text x="410" y="494" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="22" font-weight="700">新增签约项目</text>
    <rect x="410" y="514" width="806" height="94" fill="#FFFFFF" stroke="#D2D3D4"/>
