    <text x="884" y="312" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_2_AMOUNT}}</text>
    <text x="1000" y="312" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_2_DEPT}}</text>
