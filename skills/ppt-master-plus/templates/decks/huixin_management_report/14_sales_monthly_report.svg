    <text x="884" y="346" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_3_AMOUNT}}</text>
    <text x="1000" y="346" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_3_DEPT}}</text>
    <text x="430" y="380" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_4_TIME}}</text>
    <text x="540" y="380" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_4_NAME}}</text>
    <text x="884" y="380" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_4_AMOUNT}}</text>
    <text x="1000" y="380" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_4_DEPT}}</text>
    <text x="430" y="414" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_5_TIME}}</text>
    <text x="540" y="414" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_5_NAME}}</text>
    <text x="884" y="414" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_5_AMOUNT}}</text>
    <text x="1000" y="414" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{DEAL_5_DEPT}}</text>
