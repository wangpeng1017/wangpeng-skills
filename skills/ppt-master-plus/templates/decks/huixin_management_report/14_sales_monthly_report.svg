    <text x="1034" y="537" fill="#FFFFFF" font-family="Microsoft YaHei" font-size="13" font-weight="700">备注</text>
    <rect x="410" y="548" width="806" height="30" fill="#F3F7FA"/>
    <text x="430" y="568" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{SIGN_1_TIME}}</text>
    <text x="570" y="568" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{SIGN_1_NAME}}</text>
    <text x="924" y="568" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{SIGN_1_AMOUNT}}</text>
    <text x="1034" y="568" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{SIGN_1_NOTE}}</text>
    <text x="430" y="598" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{SIGN_2_TIME}}</text>
    <text x="570" y="598" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{SIGN_2_NAME}}</text>
    <text x="924" y="598" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{SIGN_2_AMOUNT}}</text>
    <text x="1034" y="598" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="13">{{SIGN_2_NOTE}}</text>
  </g>

  <text x="64" y="674" fill="#4B5563" font-family="Microsoft YaHei" font-size="11">Huixin Management Report Template</text>
  <text x="1216" y="674" text-anchor="end" fill="#4B5563" font-family="Microsoft YaHei" font-size="12">{{PAGE_NUM}}</text>
