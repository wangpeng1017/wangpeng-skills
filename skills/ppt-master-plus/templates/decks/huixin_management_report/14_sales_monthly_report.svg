<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="5" fill="#4295B6"/>
  <text x="64" y="45" fill="#4B5563" font-family="Microsoft YaHei" font-size="13">13 / SALES MONTHLY REPORT</text>
  <image href="images/huixin_logo_light.png" x="1030" y="18" width="170" height="40" preserveAspectRatio="xMidYMid meet"/>
  <text x="64" y="104" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="34" font-weight="700">{{PAGE_TITLE}}</text>
  <text x="64" y="142" fill="#4295B6" font-family="Microsoft YaHei" font-size="18" font-weight="700">{{KEY_MESSAGE}}</text>

  <g id="left-summary">
    <rect x="64" y="178" width="308" height="430" rx="8" fill="#FFFFFF" stroke="#D2D3D4"/>
    <text x="92" y="222" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="22" font-weight="700">业绩结果</text>
    <rect x="96" y="254" width="244" height="118" fill="#F3F7FA"/>
    <text x="128" y="294" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="18" font-weight="700">本月业绩</text>
    <text x="128" y="330" fill="#4B5563" font-family="Microsoft YaHei" font-size="15">得单数量：{{WIN_COUNT}}</text>
    <text x="128" y="358" fill="#4B5563" font-family="Microsoft YaHei" font-size="15">合同总额：{{MONTH_CONTRACT}}</text>
    <rect x="96" y="410" width="244" height="118" fill="#F3F7FA"/>
    <text x="128" y="450" fill="#0B2F3A" font-family="Microsoft YaHei" font-size="18" font-weight="700">累计业绩</text>
    <text x="128" y="486" fill="#4B5563" font-family="Microsoft YaHei" font-size="15">得单项目：{{YTD_WIN_COUNT}}</text>
    <text x="128" y="514" fill="#4B5563" font-family="Microsoft YaHei" font-size="15">合同总额：{{YTD_CONTRACT}}</text>
  </g>

